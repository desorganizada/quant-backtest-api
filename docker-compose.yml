name: llm-mvp

services:
  # ================================
  # ◆ OLLAMA – local LLM model server
  # ================================
  ollama:
    image: ollama/ollama:latest
    container_name: llm-mvp-ollama-1
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - OLLAMA_KEEP_ALIVE=24h
      - TZ=Asia/Dubai
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  # ================================
  # ◆ SEARXNG – local meta search engine
  # ================================
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    restart: unless-stopped
    environment:
      - TZ=Asia/Dubai
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  # ================================
  # ◆ OPEN WEBUI – LLM web interface
  # ================================
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: llm-mvp-openwebui-1
    depends_on:
      - ollama
      - searxng
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - ENABLE_LOGIN=true
      - ENABLE_SIGNUP=true
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - ENABLE_RAG_WEB_SEARCH=true
      - RAG_WEB_SEARCH_ENGINE=searxng
      - RAG_WEB_SEARCH_RESULT_COUNT=5
      - RAG_WEB_SEARCH_CONCURRENT_REQUESTS=8
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>
      - TZ=Asia/Dubai
    volumes:
      - openwebui_data:/app/backend/data
    ports:
      - "3000:8080"
    restart: unless-stopped

  # ===================================
  # 🔹 POSTGRES — DB do n8n
  # ===================================
  n8n-postgres:
    image: postgres:16-alpine
    container_name: llm-mvp-n8n-postgres-1
    restart: unless-stopped  # ✅ removi o "c" que estava quebrando
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=${N8N_DB_PASSWORD}
      - POSTGRES_DB=n8n
      - TZ=Asia/Dubai
    volumes:
      - n8n_postgres_data:/var/lib/postgresql/data

  # ===================================
  # 🔹 N8N — workflow automation
  # ===================================
  n8n:
    image: n8nio/n8n:latest
    container_name: llm-mvp-n8n-1
    depends_on:
      - n8n-postgres
      - backtest-runner  # ✅ garante que o runner sobe antes (não é obrigatório, mas ajuda)
    ports:
      - "5678:5678"
    restart: unless-stopped
    environment:
      - NODE_ENV=production

      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}

      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}

      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD}

      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}

      - GENERIC_TIMEZONE=Asia/Dubai
      - TZ=Asia/Dubai

    volumes:
      - n8n_data:/home/node/.n8n
      - /home/dcas-qnt-dpt-003/llm-server/cryptam-data-backtesting:/data/backtesting

  # ===================================
  # 🔹 BACKTEST RUNNER — micromamba + cryptam + ee + API
  # ===================================
  backtest-runner:
    build:
      context: ./backtest-runner
      args:
        GITLAB_PYPI_TOKEN: ${GITLAB_PYPI_TOKEN}

    # ✅ recomendo trocar pra um nome simples e estável:
    container_name: backtest-runner

    restart: unless-stopped
    environment:
      - TZ=Asia/Dubai

    # ✅ porta do serviço FastAPI
    ports:
      - "8000:8000"

    # ✅ mesmo volume do n8n para enxergar os arquivos
    volumes:
      - /home/dcas-qnt-dpt-003/llm-server/cryptam-data-backtesting:/data/backtesting

    # ✅ IMPORTANTE: removi o tail -f /dev/null
    # (o container agora vai subir o uvicorn via CMD do Dockerfile)

# ===================================
# 🔹 Persistent Volumes
# ===================================
volumes:
  ollama_models:
  openwebui_data:
  n8n_data:
  n8n_postgres_data:
